name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm run deploy
        env:
          # Alchemy
          ALCHEMY_DEPLOY: "1"
          ALCHEMY_STAGE: prod
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}

          # Cloudflare
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

          # App config (non-secret)
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL }}
          COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}
          LAMBDA_FUNCTION_URL: ${{ vars.LAMBDA_FUNCTION_URL }}
          LAMBDA_REGION: ${{ vars.LAMBDA_REGION }}

          # App secrets
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          # Google Drive 連携 (OAuth 2.0 / scope: drive.file)
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: ${{ vars.GOOGLE_OAUTH_REDIRECT_URI }}
          # D1 に保存するアクセス/リフレッシュトークンの at-rest 暗号化鍵 (AES-256-GCM)
          INTEGRATION_ENCRYPTION_KEY: ${{ secrets.INTEGRATION_ENCRYPTION_KEY }}

          # Stripe（@better-auth/stripe）
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          # Publishable key はクライアントに露出する設計なので Variable で扱う
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PRICE_ID_PRO_MONTH: ${{ vars.STRIPE_PRICE_ID_PRO_MONTH }}
          STRIPE_PRICE_ID_PRO_YEAR: ${{ vars.STRIPE_PRICE_ID_PRO_YEAR }}
          STRIPE_PORTAL_RETURN_URL: ${{ vars.STRIPE_PORTAL_RETURN_URL }}
          STRIPE_CHECKOUT_SUCCESS_URL: ${{ vars.STRIPE_CHECKOUT_SUCCESS_URL }}
          STRIPE_CHECKOUT_CANCEL_URL: ${{ vars.STRIPE_CHECKOUT_CANCEL_URL }}
